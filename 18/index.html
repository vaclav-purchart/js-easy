			headPivot.position.z  = 0.28 + Math.sin(phase * 2) * 0.02
		} else {
			leftLeg.rotation.x  *= 0.85
			rightLeg.rotation.x *= 0.85
			leftWing.rotation.z  *= 0.85
			rightWing.rotation.z *= 0.85
			phase += dt * 1.5
			headPivot.position.y = 0.6 + Math.sin(phase) * 0.015
		}
	}
	root.userData.hpBar = hpBar
	return root
}

// Mob HP bar — tiny floating sprite, hidden until the mob takes damage.
function makeMobHpBar() {
	const W = 64, H = 8
	const c = document.createElement('canvas'); c.width = W; c.height = H
	const ctx = c.getContext('2d')
	const tex = new THREE.CanvasTexture(c)
	tex.minFilter = THREE.LinearFilter
	const mat = new THREE.SpriteMaterial({ map: tex, depthTest: false })
	const sprite = new THREE.Sprite(mat)
	sprite.scale.set(0.7, 0.09, 1)
	sprite.visible = false
	sprite.userData.draw = (frac) => {
		ctx.clearRect(0, 0, W, H)
		ctx.fillStyle = 'rgba(0,0,0,.7)'; ctx.fillRect(0, 0, W, H)
		const r = Math.floor(255 * (1 - frac)), g = Math.floor(255 * frac)
		ctx.fillStyle = `rgb(${r},${g},0)`
		ctx.fillRect(1, 1, (W - 2) * frac, H - 2)
		tex.needsUpdate = true
	}
	return sprite
}

// Per-type registries — plugins extend these via api.registerMob().
// MOB_HITBOXES keys: { sx, sy, sz, oy } — box size + Y offset of its centre.
const MOB_MODELS = {
	chicken: makeChickenModel,
}
const MOB_HITBOXES = {
	chicken: { sx: 0.7, sy: 0.9, sz: 0.8, oy: 0.45 },
}
const _DEFAULT_MOB_HITBOX = { sx: 0.7, sy: 0.9, sz: 0.8, oy: 0.45 }

// AI fields a plugin may set. These are forwarded to the server (which
// re-validates + clamps); anything else stays in the browser. Keep this
// list aligned with MOB_FIELD_RANGES in voxel-world.mjs.
const _MOB_AI_FIELDS = [
	'maxHp', 'damage', 'speed',
	'regionSize', 'countPerRegion',
	'spawnMinRadius', 'spawnRadius', 'despawnRadius',
	'wanderMin', 'wanderMax', 'idleMinMs', 'idleMaxMs',
	'stepMaxClimb', 'respawnDelayMs',
	'fleeBoostMs', 'fleeBoostMul',
	'aggroRadius', 'deaggroRadius', 'aggroDurationMs',
	'attackRange', 'attackDamage', 'attackCooldownMs', 'chaseMul',
]

function _pickMobAiFields(cfg) {
	const out = { type: cfg.type }
	if (cfg.behavior === 'passive' || cfg.behavior === 'hostile') {
		out.behavior = cfg.behavior
	}
	for (const k of _MOB_AI_FIELDS) {
		if (cfg[k] !== undefined && Number.isFinite(Number(cfg[k]))) {
			out[k] = Number(cfg[k])
		}
	}
	return out
}

// Plugins can register mobs before we've connected (or while reconnecting).
// We hold onto every config and (re)flush after each `init` from the server.
const _pendingMobRegistrations = new Map()   // type → config
function queueMobTypeRegistration(config) {
	_pendingMobRegistrations.set(config.type, config)
	if (ws && ws.readyState === 1 && myId !== null) {
		ws.send(JSON.stringify({ type: 'register_mob_type', config }))
	}
}
function flushMobTypeRegistrations() {
	if (!ws || ws.readyState !== 1) return
	for (const cfg of _pendingMobRegistrations.values()) {
		ws.send(JSON.stringify({ type: 'register_mob_type', config: cfg }))
	}
}

function addMob(data) {
	if (mobs.has(data.id)) return
	const factory = MOB_MODELS[data.type]
	if (!factory) { console.warn('[mob] unknown type:', data.type); return }
	const model = factory()
	model.position.set(data.x, data.y, data.z)
	model.rotation.y = data.yaw || 0

	// Invisible hit box for combat raycasting (slightly larger than the body).
	// Sized per-type so a small bunny isn't as easy to click as a wolf.
	const hb = MOB_HITBOXES[data.type] || _DEFAULT_MOB_HITBOX
	const hitBox = new THREE.Mesh(
		new THREE.BoxGeometry(hb.sx, hb.sy, hb.sz),
		new THREE.MeshBasicMaterial({ visible: false }),
	)
	hitBox.position.y = hb.oy
	hitBox.userData.mobId = data.id
	model.add(hitBox)
	mobPickMeshes.push(hitBox)
	scene.add(model)

	mobs.set(data.id, {
		model, hitBox,
		data: { ...data, tx: data.x, ty: data.y, tz: data.z, tyaw: data.yaw || 0 },
	})

	// Damaged on join? Show the bar straight away.
	if (data.hp < data.maxHp) {
		const bar = model.userData.hpBar
		bar.visible = true
		bar.userData.draw(data.hp / data.maxHp)
	}
}

function removeMob(id) {
	const m = mobs.get(id)
	if (!m) return
	scene.remove(m.model)
	const i = mobPickMeshes.indexOf(m.hitBox); if (i !== -1) mobPickMeshes.splice(i, 1)
	mobs.delete(id)
}

function updateMobTarget(id, x, y, z, yaw) {
	const m = mobs.get(id); if (!m) return
	m.data.tx = x; m.data.ty = y; m.data.tz = z
	if (yaw !== undefined) m.data.tyaw = yaw
}

function updateMobHp(id, hp) {
	const m = mobs.get(id); if (!m) return
	m.data.hp = hp
	const bar = m.model.userData.hpBar
	if (!bar) return
	const frac = hp / m.data.maxHp
	bar.userData.draw(frac)
	bar.visible = hp < m.data.maxHp
}

function tickMobs(dt) {
	const alpha = Math.min(dt * 8, 1)
	for (const { model, data } of mobs.values()) {
		const oldX = model.position.x, oldZ = model.position.z
		model.position.x += (data.tx - model.position.x) * alpha
		model.position.y += (data.ty - model.position.y) * alpha
		model.position.z += (data.tz - model.position.z) * alpha
		// Yaw: shortest-arc lerp so we don't take the long way round
		let dy = data.tyaw - model.rotation.y
		while (dy >  Math.PI) dy -= 2 * Math.PI
		while (dy < -Math.PI) dy += 2 * Math.PI
		model.rotation.y += dy * alpha

		const dx = model.position.x - oldX, dz = model.position.z - oldZ
		const speed = dt > 0 ? Math.hypot(dx, dz) / dt : 0
		model.userData.tickAnim?.(dt, speed > 0.05)
	}
}

// ── Joystick state ──
const joy = { active:false, id:-1, cx:0, cy:0, dx:0, dy:0 }
const JOY_RADIUS = 52   // max knob travel in px

const joystickZone = document.getElementById('joystick-zone')
const joystickKnob = document.getElementById('joystick-knob')

function joyUpdate(tx, ty) {
	const rect = joystickZone.getBoundingClientRect()
	const cx = rect.left + rect.width / 2
	const cy = rect.top + rect.height / 2
	const dx = tx - cx
	const dy = ty - cy
	const dist = Math.sqrt(dx * dx + dy * dy)
	const clamped = Math.min(dist, JOY_RADIUS)
	const angle = Math.atan2(dy, dx)
	joy.dx = (clamped / JOY_RADIUS) * Math.cos(angle)
	joy.dy = (clamped / JOY_RADIUS) * Math.sin(angle)
	const ox = Math.cos(angle) * clamped
	const oy = Math.sin(angle) * clamped
	joystickKnob.style.transform = `translate(calc(-50% + ${ox}px), calc(-50% + ${oy}px))`
}

joystickZone.addEventListener('touchstart', (e) => {
	e.preventDefault()
	const t = e.changedTouches[0]
	joy.active = true
	joy.id = t.identifier
	joyUpdate(t.clientX, t.clientY)
}, { passive: false })

joystickZone.addEventListener('touchmove', (e) => {
	e.preventDefault()
	for (const t of e.changedTouches) {
		if (t.identifier === joy.id) { joyUpdate(t.clientX, t.clientY); break }
	}
}, { passive: false })

function joyReset() {
	joy.active = false; joy.id = -1; joy.dx = 0; joy.dy = 0
	joystickKnob.style.transform = 'translate(-50%, -50%)'
}
joystickZone.addEventListener('touchend', (e) => { e.preventDefault(); joyReset() }, { passive:false })
joystickZone.addEventListener('touchcancel', (e) => { e.preventDefault(); joyReset() }, { passive:false })

// ── Look / camera swipe (anywhere NOT on a UI element) ──
const look = { active:false, id:-1, lx:0, ly:0 }

// Zones that should NOT trigger look: left 200px (joystick), right 200px (buttons), any UI element
function isLookTarget(el) {
	// Ignore touches that start on joystick, action buttons, or nickname UI
	if (el.closest('#joystick-zone,#action-buttons,#hotbar,#game-gui,#btn-inventory-open')) return false
	return true
}

document.addEventListener('touchstart', (e) => {
	for (const t of e.changedTouches) {
		if (!look.active && isLookTarget(e.target)) {
			look.active = true
			look.id = t.identifier
			look.lx = t.clientX
			look.ly = t.clientY
		}
	}
}, { passive: true })

document.addEventListener('touchmove', (e) => {
	for (const t of e.changedTouches) {
		if (t.identifier === look.id && look.active) {
			const dx = t.clientX - look.lx
			const dy = t.clientY - look.ly
			look.lx = t.clientX
			look.ly = t.clientY
			yawObject.rotation.y -= dx * 0.004
			pitch -= dy * 0.004
			pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch))
			camera.rotation.x = pitch
		}
	}
}, { passive: true })

document.addEventListener('touchend', (e) => {
	for (const t of e.changedTouches) {
		if (t.identifier === look.id) { look.active = false; look.id = -1 }
	}
}, { passive: true })

// ── Action buttons ──
const touchState = { jump:false, mine:false, place:false }

function setupTouchBtn(id, key) {
	const el = document.getElementById(id)
	el.addEventListener('touchstart', (e) => {
		e.preventDefault()
		touchState[key] = true
		el.classList.add('pressed')
		if (key === 'place') placeBlock()
		if (key === 'mine') { mining = true; tryHitTarget() }
	}, { passive:false })
	el.addEventListener('touchend', (e) => {
		e.preventDefault()
		touchState[key] = false
		el.classList.remove('pressed')
		if (key === 'mine') { mining = false; miningTime = 0; document.getElementById('progress').style.display = 'none' }
	}, { passive:false })
	el.addEventListener('touchcancel', (e) => {
		e.preventDefault()
		touchState[key] = false
		el.classList.remove('pressed')
		if (key === 'mine') { mining = false; miningTime = 0 }
	}, { passive:false })
}

setupTouchBtn('btn-jump', 'jump')
setupTouchBtn('btn-mine', 'mine')
setupTouchBtn('btn-place', 'place')

function mineBlock(dt) {
	const result = currentTarget
	if (!result) return
	const { face } = result
	if (face.type === BLOCK.WATER) return

	miningTime += dt
	const progress = Math.min(miningTime / 0.6, 1)
	const bar = document.getElementById('progress')
	bar.style.display = 'block'
	bar.firstChild.style.width = progress * 100 + '%'

	if (progress >= 1) {
		const { x, y, z } = face
		miningTime = 0

		if (face.type < 0) {
			// Plant sentinel: mark the surface block below as having no plant.
			// We store a special key "plant_x_z" in modified to suppress it.
			const pk = `plant_${x}_${z}`
			modified.set(pk, BLOCK.AIR)
			rebuildChunk(Math.floor(x / CHUNK_SIZE), Math.floor(z / CHUNK_SIZE))
			netSendBlockUpdate(pk, BLOCK.AIR)
		} else {
			const k = `${x}_${y}_${z}`
			modified.set(k, BLOCK.AIR)
			// Also remove any plant sitting on top of this block
			const plantKey = `plant_${x}_${z}`
			if (plantAt(x, z) >= 0) modified.set(plantKey, BLOCK.AIR)
			rebuildChunk(Math.floor(x / CHUNK_SIZE), Math.floor(z / CHUNK_SIZE))
			netSendBlockUpdate(k, BLOCK.AIR)
		}
	}
}

function placeBlock() {
	const result = currentTarget
	if (!result) return
	const { face } = result
	const { x, y, z, nx, ny, nz } = face
	const px = x + nx, py = y + ny, pz = z + nz
	const pk = `${px}_${py}_${pz}`
	const isM = modified.has(pk)
	if (isM && modified.get(pk) !== BLOCK.AIR) return
	if (!isM) {
		const ph = terrainHeight(px, pz)
		if (py <= ph || py === BEDROCK_Y || (py > ph && py <= SEA_LEVEL)) return
	}
	const btype = equippedBlockId() ?? BLOCK.DIRT
	modified.set(pk, btype)
	rebuildChunk(Math.floor(px / CHUNK_SIZE), Math.floor(pz / CHUNK_SIZE))
	netSendBlockUpdate(pk, btype)
}

   TOOLS  — PNG-based voxel items shown in hand
============================================================ */

// ── Tool definitions ─────────────────────────────────────────────────────
// Each entry: { name, url }  OR  { name, draw(ctx,W,H) } for canvas-drawn tools.
// Non-transparent pixels in the 16×16 bitmap become flat voxel slabs in 3D.
// Per-tool damage is sent with each hit so the server stays a dumb arbiter and
// new weapons (axes, hammers, …) can tweak their damage without touching the
// server. The server still clamps to a sane max to avoid abuse.
const DEFAULT_TOOL_DAMAGE = 5
const TOOL_DEFS = [
	{
		name: 'Sword',
		url: 'https://purchart.cloud/images?file=2026-03-25--06-32-44---luky13---dia-mec.png',
		damage: 20,
	},
	{
		name: 'Pickaxe',
		url: 'https://purchart.cloud/images?file=2026-03-25--19-33-18---luky15---kamenny-krumpac.png',
		damage: 5,
	},
	// To add more tools, append here:
	// { name: 'Axe', url: '...', damage: 12 },
	// { name: 'Shovel', draw(ctx,W,H){ ... }, damage: 4 },
]

// ── Build a 3D voxel model from a 16×16 RGBA pixel array ─────────────────
// Each opaque pixel → one flat box (1×1×0.25 units).
// Model origin is centred horizontally, bottom-aligned vertically.
function buildToolModel(pixels, W, H) {
	const root = new THREE.Group()
	const VOXEL_SIZE = 1 / 16   // each pixel = 1/16 world unit → tool is 1 unit tall

	for (let py = 0; py < H; py++) {
		for (let px = 0; px < W; px++) {
			const i = (py * W + px) * 4
			const a = pixels[i + 3]
			if (a < 16) continue   // skip transparent / near-transparent

			const r = pixels[i] / 255
			const g = pixels[i + 1] / 255
			const b = pixels[i + 2] / 255

			const geo = new THREE.BoxGeometry(VOXEL_SIZE, VOXEL_SIZE, VOXEL_SIZE * 0.5)
			const mat = new THREE.MeshLambertMaterial({ color: new THREE.Color(r, g, b) })
			const mesh = new THREE.Mesh(geo, mat)

			// Place so (0,0) is top-left; centre the whole sprite
			mesh.position.set(
				(px - W / 2 + 0.5) * VOXEL_SIZE,
				(-py + H / 2 - 0.5) * VOXEL_SIZE,
				0
			)
			root.add(mesh)
		}
	}
	return root
}

// ── Build a small 3D block for the hand — uses the atlas texture ─────────
// Returns a THREE.Mesh that looks like a held block (tilted cube).
const _blockHandModelCache = new Map()
function makeBlockHandModel(blockId) {
	if (_blockHandModelCache.has(blockId)) return _blockHandModelCache.get(blockId)

	const S = 0.42   // world-unit size of the hand-held block
	const geo = new THREE.BoxGeometry(S, S, S)

	// Assign per-face UVs from the atlas: right/left/top/bottom/front/back
	// BoxGeometry face order: +X, -X, +Y, -Y, +Z, -Z → side,side,top,bottom,side,side
	const uvAttr = geo.attributes.uv
	const faceUVSources = [0, 0, 1, 2, 0, 0]   // col: side,side,top,bottom,side,side
	for (let face = 0; face < 6; face++) {
		const [u0, v0, u1, v1] = tileUV(blockId, faceUVSources[face])
		const base = face * 4
		// BoxGeometry UV layout per face: BL, BR, TL, TR
		uvAttr.setXY(base + 0, u0, v0)
		uvAttr.setXY(base + 1, u1, v0)
		uvAttr.setXY(base + 2, u0, v1)
		uvAttr.setXY(base + 3, u1, v1)
	}
	uvAttr.needsUpdate = true

	const mesh = new THREE.Mesh(geo, matOpaque)
	// Tilt so it looks naturally held — rotate 20° on X and Y
	mesh.rotation.x = 0.35
	mesh.rotation.y = 0.6
	_blockHandModelCache.set(blockId, mesh)
	return mesh
}

// ── Load one tool def → resolves with { name, model, iconDataURL } ────────
function loadTool(def) {
	return new Promise((resolve) => {
		const W = 16, H = 16
		const offscreen = document.createElement('canvas')
		offscreen.width = W; offscreen.height = H
		const ctx = offscreen.getContext('2d')

		function finish() {
			const pixels = ctx.getImageData(0, 0, W, H).data
			const model = buildToolModel(pixels, W, H)
			const iconDataURL = offscreen.toDataURL()
			resolve({ name: def.name, model, iconDataURL, damage: def.damage ?? DEFAULT_TOOL_DAMAGE })
		}

		if (def.draw) {
			// Canvas-drawn tool
			def.draw(ctx, W, H)
			finish()
		} else {
			// PNG from URL
			const img = new Image()
			img.crossOrigin = 'anonymous'
			img.onload = () => {
				ctx.clearRect(0, 0, W, H)
				ctx.drawImage(img, 0, 0, W, H)
				finish()
			}
			img.onerror = () => {
				// Fallback: draw a coloured rectangle so the slot isn't empty
				ctx.fillStyle = '#f0f'
				ctx.fillRect(0, 0, W, H)
				finish()
			}
			img.src = def.url
		}
	})
}

// ── Hand / viewport model ─────────────────────────────────────────────────
// The hand pivot is a child of the camera so it always stays in view.
// We animate it by rotating the pivot on mousedown/mining.

const handPivot = new THREE.Group()
handPivot.position.set(0.38, -0.38, -0.55)
camera.add(handPivot)   // child of camera → always stays in view

// Inner group carries the fixed base orientation of the tool.
// handPivot is used only for swing/bob animation so those don't stomp the base rotation.
const handOrient = new THREE.Group()
handOrient.rotation.y = Math.PI / 2    // face toward player (along Z)
handOrient.rotation.z = -Math.PI / 2   // tilt horizontal, pointing in movement direction
handPivot.add(handOrient)

// Swing state
let swingTime = 0
let swingActive = false

function tickHandModel(dt) {
	const tool    = equippedTool()
	const blockId = equippedBlockId()

	// Determine the model to show
	let wantModel = null
	if (tool)         wantModel = tool.model
	else if (blockId) wantModel = makeBlockHandModel(blockId)

	handPivot.visible = (wantModel !== null)
	if (!wantModel) return

	// Swap model if equipped item changed
	if (handPivot.userData.activeModel !== wantModel) {
		if (handPivot.userData.activeModel) handOrient.remove(handPivot.userData.activeModel)
		handOrient.add(wantModel)
		handPivot.userData.activeModel = wantModel
	}

	// Swing animation: forward-and-back rotation around X when mining/placing
	if (mining || swingActive) {
		swingTime += dt * 8
		if (swingTime >= Math.PI) { swingTime = 0; swingActive = false }
	} else {
		swingTime = 0
	}
	handPivot.rotation.x = Math.sin(swingTime) * (Math.PI / 3)
	handPivot.rotation.z = Math.sin(Date.now() * 0.001) * 0.03
}

// Trigger a single swing on right-click / place even when not mining
function triggerSwing() { swingActive = true; swingTime = 0 }

   HOTBAR  — unified blocks + tools

// Hotbar items: first blocks, then tools (appended once loaded)

const HOTBAR_ITEMS = [
	{ type: 'block', blockId: BLOCK.DIRT,   name: 'Dirt'   },
	{ type: 'block', blockId: BLOCK.STONE,  name: 'Stone'  },
	{ type: 'block', blockId: BLOCK.WOOD,   name: 'Wood'   },
	{ type: 'block', blockId: BLOCK.SAND,   name: 'Sand'   },
	{ type: 'block', blockId: BLOCK.GLASS,  name: 'Glass'  },

	// Tools appended dynamically after loading (slots 7, 8, 9, …)
]

// These stay for backward compat with placeBlock
const HOTBAR_BLOCKS = HOTBAR_ITEMS.map(it => it.blockId)

function equippedTool() {
	const item = HOTBAR_ITEMS[selectedSlot]
	if (!item || item.type !== 'tool') return null
	return loadedTools[item.toolIndex] ?? null
}

function equippedBlockId() {
	const item = HOTBAR_ITEMS[selectedSlot]
	if (!item || item.type !== 'block') return null
	return item.blockId
}

// Draw mini block icons from atlas
function makeBlockIcon(blockId) {
	const c = document.createElement('canvas')
	c.width = c.height = 24
	const ctx2 = c.getContext('2d')
	ctx2.imageSmoothingEnabled = false
	const [su0, sv0, su1, sv1] = tileUV(blockId, 0)
	const [tu0, tv0, tu1, tv1] = tileUV(blockId, 1)
	const aw = atlasCanvas.width, ah = atlasCanvas.height
	ctx2.drawImage(atlasCanvas,
		su0 * aw, (1 - sv1) * ah, (su1 - su0) * aw, (sv1 - sv0) * ah,
		0, 8, 24, 16)
	ctx2.drawImage(atlasCanvas,
		tu0 * aw, (1 - tv1) * ah, (tu1 - tu0) * aw, (tv1 - tv0) * ah,
		0, 0, 24, 10)
	const img = document.createElement('img')
	img.src = c.toDataURL()
	img.className = 'icon'
	return img
}

function rebuildHotbarDOM() {
	hotbar.innerHTML = ''
	for (let i = 0; i < HOTBAR_ITEMS.length; i++) {
		const item = HOTBAR_ITEMS[i]
		const d = document.createElement('div')
		d.className = 'slot'

		if (item.type === 'block') {

		lbl.textContent = item.name
		d.appendChild(lbl)
		hotbar.appendChild(d)
	}
	updateHotbar()
}

   BLOCK REGISTRY  — single source of truth for all available blocks.
   Add entries here to make blocks appear in the GUI automatically.
   Mods can push to this array before or after game start.
   Each entry: { id, name, category }
============================================================ */
const BLOCK_REGISTRY = [
	{ id: BLOCK.DIRT,   name: 'Dirt',   category: 'Natural' },
	{ id: BLOCK.GRASS,  name: 'Grass',  category: 'Natural' },
	{ id: BLOCK.STONE,  name: 'Stone',  category: 'Natural' },
	{ id: BLOCK.SAND,   name: 'Sand',   category: 'Natural' },
	{ id: BLOCK.WOOD,   name: 'Wood',   category: 'Natural' },
	{ id: BLOCK.LEAVES, name: 'Leaves', category: 'Natural' },
	{ id: BLOCK.WATER,  name: 'Water',  category: 'Natural' },
	{ id: BLOCK.GLASS,  name: 'Glass',  category: 'Crafted' },
	{ id: BLOCK.BEDROCK,name: 'Bedrock',category: 'Special' },
]

// ── Core block registration implementation ────────────────────────────────
// Adds a new block type at runtime: extends atlas, registers in GUI, updates
// the worker's block list (passed per-job so no worker recreation needed).
function _registerBlockNow(def) {
	const id = def.id
	if (blockAtlasRow[id] !== undefined) {
		console.warn(`[plugin] Block id ${id} already registered, skipping`)
		return
	}
	// 1. Register ID
	if (!BLOCK[def.name]) BLOCK[def.name] = id   // optional: add to BLOCK map
	if (def.transparent) TRANSPARENT.add(id)
	const row = ALL_BLOCK_IDS.length
	ALL_BLOCK_IDS.push(id)
	blockAtlasRow[id] = row

	// 2. Draw into atlas (the canvas is pre-allocated large enough)
	BLOCK_DEFS[id] = def.draw || {}
	drawAtlasTile(id, 0); drawAtlasTile(id, 1); drawAtlasTile(id, 2)
	atlasTexture.needsUpdate = true

	// 3. Register in GUI
	BLOCK_REGISTRY.push({ id, name: def.name, category: def.category || 'Plugin' })

	// 4. Invalidate chunk hand-model cache for this id (in case it was built before)
	_blockHandModelCache.delete(id)

	// 5. Rebuild loaded chunks so geometry picks up any world blocks of this type
	for (const [k] of chunks) {
		const [cx2, cz2] = k.split('_').map(Number)
		rebuildChunk(cx2, cz2)
	}

	console.log(`[plugin] Registered block "${def.name}" (id=${id})`)
}

function renderBlockPicker() {
	const wrap = document.createElement('div')

	// Group by category
	const categories = {}
	for (const entry of BLOCK_REGISTRY) {
		if (!categories[entry.category]) categories[entry.category] = []
		categories[entry.category].push(entry)
	}

	for (const [cat, entries] of Object.entries(categories)) {
		const title = document.createElement('div')
		title.className = 'gui-section-title'
		title.textContent = cat
		wrap.appendChild(title)

		const grid = document.createElement('div')
		grid.className = 'block-grid'

		for (const entry of entries) {
			const item = document.createElement('div')
			item.className = 'block-grid-item'
			// Highlight if this block is in the current hotbar slot
			if (equippedBlockId() === entry.id) item.classList.add('selected')

			const icon = makeBlockIcon(entry.id)
			icon.style.width = '36px'; icon.style.height = '36px'
			item.appendChild(icon)

			const lbl = document.createElement('span')
			lbl.textContent = entry.name
			item.appendChild(lbl)

			item.addEventListener('click', () => _pickBlock(entry.id, item, grid))
			item.addEventListener('touchstart', (e) => { e.preventDefault(); _pickBlock(entry.id, item, grid) }, { passive:false })
			grid.appendChild(item)
		}
		wrap.appendChild(grid)

		// Spacer between categories
		const spacer = document.createElement('div')
		spacer.style.height = '12px'
		wrap.appendChild(spacer)
	}
	return wrap
}

function _pickBlock(blockId, itemEl, grid) {
	// Assign to hotbar: find existing slot with this block, or use/create one
	const existingIdx = HOTBAR_ITEMS.findIndex(it => it.type === 'block' && it.blockId === blockId)
	if (existingIdx !== -1) {
		selectedSlot = existingIdx
	} else {
		// Replace the first block slot with this block
		const firstBlockIdx = HOTBAR_ITEMS.findIndex(it => it.type === 'block')
		if (firstBlockIdx !== -1) {
			// Shift blocks left, put new one at end of block section
			const blockItems = HOTBAR_ITEMS.filter(it => it.type === 'block')
			const toolItems  = HOTBAR_ITEMS.filter(it => it.type === 'tool')
			blockItems.shift()
			const reg = BLOCK_REGISTRY.find(r => r.id === blockId)
			blockItems.push({ type:'block', blockId, name: reg?.name ?? String(blockId) })
			HOTBAR_ITEMS.length = 0
			for (const it of [...blockItems, ...toolItems]) HOTBAR_ITEMS.push(it)
			selectedSlot = HOTBAR_ITEMS.length - toolItems.length - 1
		}
	}
	// Update selection highlight in grid
	;[...grid.querySelectorAll('.block-grid-item')].forEach(el => el.classList.remove('selected'))
	itemEl.classList.add('selected')
	rebuildHotbarDOM()
	closeGui()
}

/* ============================================================
   NICK / COMMAND  (nickname set via /nick in chat; /reset still works)
============================================================ */
let myNickname = 'Player' + Math.floor(Math.random() * 9000 + 1000)

function handleCommand(raw) {
	const v = raw.trim()
	if (!v) return
	if (v === '/reset') {
		modified.clear()
		for (const [k] of chunks) {
			const [cx2, cz2] = k.split('_').map(Number)
			rebuildChunk(cx2, cz2)
		}
		netSend({ type: 'world_reset' })
		showToast('World reset!')
		return
	}
	if (v.startsWith('/nick ')) {
		myNickname = v.slice(6).trim().slice(0, 20)
		netSendNickname(myNickname)
		showToast(`Nickname set to "${myNickname}"`)
		return
	}
	// /remove <blockname|ALL> <radius>
	// Tells the server to remove all modified blocks of the given type within
	// radius blocks of the player. Server broadcasts the changes to everyone.
	const removeMatch = v.match(/^\/remove\s+(\S+)\s+(\d+)$/i)
	if (removeMatch) {
		const blockName = removeMatch[1].toUpperCase()
		const radius    = Math.min(parseInt(removeMatch[2], 10), 500)

		let blockId = null   // null = ALL
		if (blockName !== 'ALL') {
			// Find block ID by name — check BLOCK map and BLOCK_REGISTRY
			blockId = BLOCK[blockName] ?? null
			if (blockId === null) {
				const reg = BLOCK_REGISTRY.find(r => r.name.toUpperCase() === blockName)
				blockId = reg?.id ?? null
			}
			if (blockId === null) {
				showToast(`Unknown block: ${removeMatch[1]}`)
				return
			}
		}

		const px = Math.floor(player.pos.x)
		const py = Math.floor(player.pos.y)
		const pz = Math.floor(player.pos.z)

		if (offlineMode) {
			// Offline: apply locally (no server to tell)
			const r2 = radius * radius
			let removed = 0
			const affectedChunks = new Set()
			for (const [k, val] of [...modified.entries()]) {
				if (blockId !== null && val !== blockId) continue
				const parts = k.split('_')
				const bx = parseInt(parts[0], 10), bz = parseInt(parts[2], 10)
				if ((bx-px)**2 + (bz-pz)**2 > r2) continue
				modified.delete(k)
				removed++
				affectedChunks.add(chunkKey(Math.floor(bx/CHUNK_SIZE), Math.floor(bz/CHUNK_SIZE)))
			}
			for (const ck of affectedChunks) {
				const [cx2, cz2] = ck.split('_').map(Number)
				rebuildChunk(cx2, cz2)
			}
			showToast(`Removed ${removed} block${removed !== 1 ? 's' : ''} (offline)`)
		} else {
			// Online: send to server — it will broadcast block_update messages to everyone
			netSend({ type: 'remove_blocks', blockId, px, py, pz, radius })
			showToast(`Removing ${blockName} within ${radius} blocks…`)
		}
		return
	}
	showToast('Unknown command: ' + v)
}

/* ============================================================
   NETWORKING
============================================================ */
const WS_URL = 'wss://purchart.cloud/voxel-world'

let ws = null, myId = null, connected = false, reconnectTimer = null
let offlineMode = false
let myWorldName = 'default'

function setStatus(state, text) {
	const el = document.getElementById('mp-status')
	el.className = state; el.textContent = text
}

function connect() {
	if (offlineMode) { setStatus('offline', 'OFFLINE (local)'); return }
	try { ws = new WebSocket(WS_URL) }
	catch (e) { setStatus('offline', 'OFFLINE'); scheduleReconnect(); return }

	ws.onopen = () => {
		connected = true
		clearTimeout(reconnectTimer)
		setStatus('', 'ONLINE ●')
		ws.send(JSON.stringify({ type:'join', nickname:myNickname, world:myWorldName }))
	}
	ws.onmessage = (e) => {
		let msg; try { msg = JSON.parse(e.data) } catch { return }
		handleServerMessage(msg)
	}
	ws.onerror = () => setStatus('error', 'ERROR ✕')
	ws.onclose = () => {
		connected = false; myId = null
		for (const id of [...remotePlayers.keys()]) removeRemotePlayer(id)
		for (const id of [...mobs.keys()]) removeMob(id)
		setStatus('offline', 'OFFLINE')
		scheduleReconnect()
	}
}

function scheduleReconnect() {
	clearTimeout(reconnectTimer)
	reconnectTimer = setTimeout(connect, 5000)
}

function handleServerMessage(msg) {
	switch (msg.type) {
		case 'init': {
			myId = msg.id
			SEED = msg.seed
			modified.clear()
			for (const { k, v } of msg.blocks) modified.set(k, v)
			for (const [k] of chunks) {
				const [cx2, cz2] = k.split('_').map(Number)
				rebuildChunk(cx2, cz2)
			}
			for (const p of msg.players) addRemotePlayer(p)
			if (msg.mobs) for (const m of msg.mobs) addMob(m)
			updatePlayerList()
			// Tell the server about every mob type plugins have registered so
			// far. Done here (not on socket open) because the server only
			// accepts non-`join` messages from authenticated players.
			flushMobTypeRegistrations()
			break
		}
		case 'mob_spawn':   addMob(msg.mob); break
		case 'mob_despawn': removeMob(msg.id); break
		case 'mob_updates': {
			for (const m of msg.mobs) updateMobTarget(m.id, m.x, m.y, m.z, m.yaw)
			break
		}
		case 'mob_hp':  updateMobHp(msg.id, msg.hp); break
		case 'mob_die': {
			// Server already removes the mob and (after a delay) spawns a fresh one.
			const rec = mobs.get(msg.id)
			const typeLabel = rec?.data.type ?? 'mob'
			removeMob(msg.id)
			addChatMessage('', `🪶 A ${typeLabel} was killed by ${msg.killerName}`, true)
			break
		}
		case 'player_join': addRemotePlayer(msg.player); updatePlayerList(); break
		case 'player_leave': removeRemotePlayer(msg.id); updatePlayerList(); break
		case 'move': moveRemotePlayer(msg.id, msg.x, msg.y, msg.z, msg.yaw, msg.pitch, msg.held, msg.swing); break
		case 'moves': {
			for (const p of msg.players) {
				if (p.id !== myId) moveRemotePlayer(p.id, p.x, p.y, p.z, p.yaw, p.pitch, p.held, p.swing)
			}
			break
		}
		case 'block_update': {
			modified.set(msg.k, msg.v)
			const [bx,, bz] = msg.k.split('_').map(Number)
			rebuildChunk(Math.floor(bx / CHUNK_SIZE), Math.floor(bz / CHUNK_SIZE))
			break
		}
		case 'player_rename': {
			const rp = remotePlayers.get(msg.id)
			if (rp) { rp.data.nickname = msg.nickname; updatePlayerLabel(rp.model, msg.nickname) }
			updatePlayerList()
			break
		}
		case 'world_reset': {
			modified.clear()
			for (const [k] of chunks) {
				const [cx2, cz2] = k.split('_').map(Number)
				rebuildChunk(cx2, cz2)
			}
			addChatMessage('', '⚡ World was reset', true)
			showToast('World was reset by another player')
			break
		}
		case 'hp_update': {
			if (msg.id === myId) {
				updateHpHUD(msg.hp)
			} else {
				const rp = remotePlayers.get(msg.id)
				if (rp) {
					rp.data.hp = msg.hp
					if (rp.model.userData.drawHpBar) {
						rp.model.userData.drawHpBar(msg.hp)
						rp.model.userData.hpTex.needsUpdate = true
					}
				}
			}
			break
		}
		case 'player_died': {
			if (msg.id === myId) {
				// Local player died — respawn
				player.pos.set(0, 20, 0)
				player.vel.set(0, 0, 0)
				player.onGround = false
				updateHpHUD(msg.hp)
				showToast(`💀 You were killed by ${msg.killerName}!`)
				addChatMessage('', `💀 ${myNickname} was killed by ${msg.killerName}`, true)
			} else {
				// Remote player died — update their HP bar and show message
				const rp = remotePlayers.get(msg.id)
				if (rp) {
					rp.data.hp = msg.hp
					if (rp.model.userData.drawHpBar) {
						rp.model.userData.drawHpBar(msg.hp)
						rp.model.userData.hpTex.needsUpdate = true
					}
					const name = rp.data.nickname
					addChatMessage('', `💀 ${name} was killed by ${msg.killerName}`, true)
				}
			}
			break
		}
		case 'chat': {
			handleChatMessage(msg)
			break
		}
		case 'plugin_added': {
			// Server detected a new or updated plugin file.
			// Remove any previously loaded script for the same filename so the
			// updated code is executed fresh (not served from browser cache).
			const filename = msg.filename || msg.url.split('/').pop().split('?')[0]
			const existing = document.head.querySelector(`script[data-plugin="${filename}"]`)
			if (existing) existing.remove()

			loadPluginScript(msg.url, filename)
				.then(() => {
					const label = filename.replace(/^plugin---\w+---/, '').replace(/\.js$/, '')
					addChatMessage('', `🧩 Plugin ${existing ? 'updated' : 'loaded'}: ${label}`, true)
					showToast(`Plugin ${existing ? 'updated' : 'loaded'}: ${label}`)
				})
				.catch(err => console.warn('[plugin_added] Failed:', err.message))
			break
		}
	}
}

let myHp = 100
const MAX_HP = 100

// ── Combat raycasting ─────────────────────────────────────────────────────
// Fires when the player left-clicks while holding a tool.
// We raycast against playerPickMeshes (invisible bounding boxes).
const _combatRaycaster = new THREE.Raycaster()
_combatRaycaster.far = 4   // melee range in blocks
let _lastHitSendTime = 0

// Raycast against both player and mob hit-boxes; closest hit wins. Tools only.
// Damage is taken from the equipped tool and sent with the message so future
// weapons can tweak their values without server changes.
function tryHitTarget() {
	const tool = equippedTool()
	if (!tool) return
	const now = performance.now()
	if (now - _lastHitSendTime < 500) return   // client-side cooldown matches server
	_combatRaycaster.setFromCamera(new THREE.Vector2(0, 0), camera)
	const hits = _combatRaycaster.intersectObjects([...playerPickMeshes, ...mobPickMeshes])
	if (!hits.length) return
	const ud = hits[0].object.userData
	const damage = tool.damage ?? DEFAULT_TOOL_DAMAGE
	if (ud.playerId) {
		_lastHitSendTime = now
		netSend({ type: 'hit_player', targetId: ud.playerId, damage })
		triggerSwing()
	} else if (ud.mobId) {
		_lastHitSendTime = now
		netSend({ type: 'hit_mob', mobId: ud.mobId, damage })
		triggerSwing()
	}
}

function netSend(obj) {
	if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj))
}
let lastMoveSendTime = 0
let lastSentPos = {}
function netSendMove(x, y, z, yaw, pitch) {
	if (!connected) return
	// Compute held item descriptor
	const tool    = equippedTool()
	const blockId = equippedBlockId()
	let held = null
	if (tool) {
		const ti = loadedTools.indexOf(tool)
		held = { t: 'tool', i: ti }
	} else if (blockId) {
		held = { t: 'block', id: blockId }
	}
	const swing = !!(mining || swingActive)
	const heldStr = JSON.stringify(held)

	// Send if position/look changed enough OR if held/swing changed
	const posUnchanged = (
		Math.abs(x - lastSentPos.x) < 0.05 && Math.abs(y - lastSentPos.y) < 0.05 &&
		Math.abs(z - lastSentPos.z) < 0.05 && Math.abs(yaw - lastSentPos.yaw) < 0.02 &&
		Math.abs(pitch - lastSentPos.pitch) < 0.02
	)
	const itemUnchanged = (heldStr === lastSentPos.heldStr && swing === lastSentPos.swing)
	if (posUnchanged && itemUnchanged) return

	// Rate limit: max 20 updates/s
	const now = performance.now()
	if (now - lastMoveSendTime < 50) return
	lastMoveSendTime = now
	lastSentPos = { x, y, z, yaw, pitch, heldStr, swing }
	netSend({ type: 'move', x, y, z, yaw, pitch, held, swing })
}
function netSendBlockUpdate(k, v) { netSend({ type:'block_update', k, v }) }
function netSendNickname(name) { netSend({ type:'set_nickname', nickname:name }) }

function updatePlayerList() {
	const el = document.getElementById('player-list')
	const total = remotePlayers.size + 1   // +1 for self
	el.style.display = 'block'
	el.innerHTML = `<b>Players online (${total})</b><hr style="margin:3px 0">`
	// Self first
	const selfEl = document.createElement('div')
	selfEl.style.color = '#8df'
	selfEl.textContent = '● ' + myNickname + ' (you)'
	el.appendChild(selfEl)
	for (const { data } of remotePlayers.values()) {
		const d = document.createElement('div')
		d.textContent = '● ' + data.nickname
		el.appendChild(d)
	}
}

// ── Lobby ─────────────────────────────────────────────────────────────────
const lobbyEl        = document.getElementById('lobby')
const lobbyNickEl    = document.getElementById('lobby-nick')
const lobbyWorldEl   = document.getElementById('lobby-world')
const settingsToggle = document.getElementById('settings-toggle')
const settingsPanel  = document.getElementById('settings-panel')

const _defaultNick = 'Player' + Math.floor(Math.random() * 9000 + 1000)
lobbyNickEl.value = _defaultNick

// ── Plugin picker ──────────────────────────────────────────────────────────
const PLUGINS_API   = 'https://purchart.cloud/voxel-world/plugins'
const pluginListEl  = document.getElementById('lobby-plugins-list')
const checkAllBtn   = document.getElementById('lobby-plugins-check-all')
let availablePlugins = []   // { url, filename, name, author }

function parsePluginMeta(url) {
	// filename schema: plugin---[author]---[name].js
	const filename = url.split('/list?file=').pop()
	console.log(filename)

	const m = filename.match(/^plugin---(.+?)---(.+?)\.js$/i)
	return {
		url,
		filename,
		author: m ? m[1].replace(/-/g, ' ') : 'unknown',
		name:   m ? m[2].replace(/-/g, ' ') : filename,
	}
}

function buildPluginList(plugins) {
	availablePlugins = plugins
	pluginListEl.classList.remove('loading', 'error')
	pluginListEl.innerHTML = ''

	if (plugins.length === 0) {
		pluginListEl.textContent = 'No plugins available.'
		pluginListEl.style.color = '#666'
		return
	}

	for (const p of plugins) {
		const row  = document.createElement('label')
		row.className = 'plugin-row'

		const cb   = document.createElement('input')
		cb.type    = 'checkbox'
		cb.dataset.url = p.url
		cb.checked = true

		const nameEl   = document.createElement('span')
		nameEl.className = 'plugin-name'
		nameEl.textContent = p.name

		const authorEl = document.createElement('span')
		authorEl.className = 'plugin-author'
		authorEl.textContent = p.author

		row.appendChild(cb)
		row.appendChild(nameEl)
		row.appendChild(authorEl)
		pluginListEl.appendChild(row)
	}

	updateCheckAllLabel()
}

function updateCheckAllLabel() {
	const all = [...pluginListEl.querySelectorAll('input[type=checkbox]')]
	checkAllBtn.textContent = all.every(c => c.checked) ? 'Uncheck all' : 'Check all'
}

checkAllBtn.addEventListener('click', () => {
	const all = [...pluginListEl.querySelectorAll('input[type=checkbox]')]
	const shouldCheck = !all.every(c => c.checked)
	all.forEach(c => { c.checked = shouldCheck })
	updateCheckAllLabel()
})
pluginListEl.addEventListener('change', updateCheckAllLabel)

// Fetch plugin list on page load
fetch(PLUGINS_API)
	.then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json() })
	.then(urls => buildPluginList(urls.map(parsePluginMeta)))
	.catch(err => {
		pluginListEl.classList.remove('loading')
		pluginListEl.classList.add('error')
		pluginListEl.textContent = 'Could not load plugin list: ' + err.message
	})

// Load a plugin script and call its init(api) function.
// Plugin scripts must assign their object to a well-known global OR
// export it as window.VoxelWorldPlugin (fallback). The convention is:
//   VoxelWorld.registerPlugin('PluginName', { init(api) { const ID = api.allocateBlockId(); ... } })
// We detect the newly added global by diffing window keys before/after load.
function loadPluginScript(url, filename) {
	return new Promise((resolve, reject) => {
		const s = document.createElement('script')
		s.src = url
		if (filename) s.dataset.plugin = filename
		s.onload = () => { resolve() }
		s.onerror = () => reject(new Error('Failed to load: ' + url))
		document.head.appendChild(s)
	})
}

// ── startGame — loads selected plugins then launches ──────────────────────
async function startGame(online) {
	myNickname = (lobbyNickEl.value.trim() || _defaultNick).slice(0, 20)
	myWorldName = (lobbyWorldEl.value.trim() || 'default').slice(0, 32)
	offlineMode = !online

	if (offlineMode) {
		SEED = Math.floor(Math.random() * 1_000_000)
		setStatus('offline', 'OFFLINE (local)')
	}

	// Load checked plugins sequentially so they register in order
	const checked = [...pluginListEl.querySelectorAll('input[type=checkbox]:checked')]
	if (checked.length > 0) {
		const btns = document.querySelectorAll('.lobby-btn')
		btns.forEach(b => { b.disabled = true; b.style.opacity = '0.5' })

		for (const cb of checked) {
			try {
				const filename = cb.dataset.url.split('/').pop().split('?')[0]
				await loadPluginScript(cb.dataset.url, filename)
				console.log('[lobby] Loaded plugin:', cb.dataset.url)
			} catch (e) {
				console.warn('[lobby] Plugin failed to load:', e.message)
			}
		}

		btns.forEach(b => { b.disabled = false; b.style.opacity = '' })
	}

	lobbyEl.style.display = 'none'
	settingsToggle.style.display = 'block'
	updatePlayerList()
	showHpBar(true)
	updateHpHUD(100)
	if (!offlineMode) connect()
	animate()
}

document.getElementById('lobby-online').addEventListener('click', () => startGame(true))
document.getElementById('lobby-offline').addEventListener('click', () => startGame(false))
lobbyNickEl.addEventListener('keydown', e => { if (e.key === 'Enter') startGame(true) })
lobbyWorldEl.addEventListener('keydown', e => { if (e.key === 'Enter') startGame(true) })

// ── Settings panel ─────────────────────────────────────────────────────────
settingsToggle.addEventListener('click', () => {
	const open = settingsPanel.style.display === 'flex'
	settingsPanel.style.display = open ? 'none' : 'flex'
	settingsToggle.textContent = open ? '⚙ Settings' : '✕ Close'
})

const rdSlider = document.getElementById('rd-slider')
const rdVal    = document.getElementById('rd-val')
rdSlider.addEventListener('input', () => {
	RENDER_DISTANCE = +rdSlider.value
	rdVal.textContent = RENDER_DISTANCE
})

// ── Save world ─────────────────────────────────────────────────────────────
document.getElementById('btn-save').addEventListener('click', () => {
	const data = { seed: SEED, world: myWorldName, modified: [...modified.entries()] }
	const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' })
	const url = URL.createObjectURL(blob)
	const a = document.createElement('a')
	a.href = url
	a.download = `voxel-${myWorldName}-${Date.now()}.json`
	a.click()
	URL.revokeObjectURL(url)
	showToast('World saved!')
})

// ── Load world ─────────────────────────────────────────────────────────────
document.getElementById('btn-load').addEventListener('click', () => {
	document.getElementById('file-load').click()
})
document.getElementById('file-load').addEventListener('change', (e) => {
	const file = e.target.files[0]
	if (!file) return
	const reader = new FileReader()
	reader.onload = (ev) => {
		try {
			const data = JSON.parse(ev.target.result)
			if (typeof data.seed === 'number') SEED = data.seed
			modified.clear()
			for (const [k, v] of data.modified || []) modified.set(k, v)
			for (const [k] of chunks) {
				const [cx2, cz2] = k.split('_').map(Number)
				rebuildChunk(cx2, cz2)
			}
			showToast(`World loaded! Seed: ${SEED}`)
		} catch (err) { showToast('Load failed: ' + err.message) }
	}
	reader.readAsText(file)
	e.target.value = ''
})
const underwaterOverlay = document.getElementById('underwater-overlay')

/* ============================================================
   CHAT SYSTEM
============================================================ */
const chatLog = document.getElementById('chat-log')
const chatInputWrap = document.getElementById('chat-input-wrap')
const chatInput = document.getElementById('chat-input')
let chatOpen = false

const chatHistory = []   // { nick, text, isSystem }

function addChatMessage(nick, text, isSystem) {
	chatHistory.push({ nick, text, isSystem })
	if (chatHistory.length > 200) chatHistory.shift()

	// If chat is open, just append to persistent view (no fade)
	if (chatOpen) {
		const msg = document.createElement('div')
		msg.className = 'chat-msg' + (isSystem ? ' system' : '') + ' persistent'
		if (isSystem) { msg.textContent = text }
		else {
			const ns = document.createElement('span'); ns.className = 'chat-nick'
			ns.textContent = nick + ': '; msg.appendChild(ns)
			msg.appendChild(document.createTextNode(text))
		}
		chatLog.appendChild(msg)
		chatLog.scrollTop = chatLog.scrollHeight
		return
	}

	// Otherwise show fading popup
	const msg = document.createElement('div')
	msg.className = 'chat-msg' + (isSystem ? ' system' : '')
	if (isSystem) { msg.textContent = text }
	else {
		const ns = document.createElement('span'); ns.className = 'chat-nick'
		ns.textContent = nick + ': '; msg.appendChild(ns)
		msg.appendChild(document.createTextNode(text))
	}
	chatLog.appendChild(msg)
	while (chatLog.children.length > 8) chatLog.removeChild(chatLog.firstChild)
	msg.addEventListener('animationend', () => { if (!chatOpen) msg.remove() })
}

function openChat() {
	if (chatOpen) return
	chatOpen = true
	chatInputWrap.style.display = 'flex'
	chatInput.value = ''
	// Re-render full history so all messages are visible (not faded)
	chatLog.innerHTML = ''
	for (const m of chatHistory) {
		const el = document.createElement('div')
		el.className = 'chat-msg' + (m.isSystem ? ' system' : '') + ' persistent'
		if (m.isSystem) {
			el.textContent = m.text
		} else {
			const ns = document.createElement('span')
			ns.className = 'chat-nick'
			ns.textContent = m.nick + ': '
			el.appendChild(ns)
			el.appendChild(document.createTextNode(m.text))
		}
		chatLog.appendChild(el)
	}
	chatLog.classList.add('history-mode')
	chatLog.scrollTop = chatLog.scrollHeight
	chatInput.focus()
	document.exitPointerLock?.()
}

function closeChat() {
	chatOpen = false
	chatInputWrap.style.display = 'none'
	chatInput.blur()
	// Clear persistent history view, keep only recent fading popups
	chatLog.innerHTML = ''
	chatLog.classList.remove('history-mode')
}

function sendChat() {
	const text = chatInput.value.trim()
	closeChat()
	if (!text) return
	if (text.startsWith('/')) {
		handleCommand(text)
		return
	}
	// Don't echo locally — server will broadcast back including to sender
	netSend({ type: 'chat', text })
}

chatInput.addEventListener('keydown', (e) => {
	e.stopPropagation()   // don't let WASD etc. fire while typing
	if (e.key === 'Enter') sendChat()
	if (e.key === 'Escape') closeChat()
})

// T or Enter opens chat (when not already in an input)
addEventListener('keydown', (e) => {
	if (chatOpen) return
	if (document.activeElement && document.activeElement.tagName === 'INPUT') return
	if (e.key === 't' || e.key === 'T') { e.preventDefault(); openChat() }
	if (e.key === 'Enter') { e.preventDefault(); openChat() }
})

// Handle incoming chat from server
function handleChatMessage(msg) {
	addChatMessage(msg.nickname, msg.text, false)
}

/* ============================================================
   MAIN LOOP
============================================================ */
const debug = document.getElementById('debug')
let lastTime = performance.now()
let frameCount = 0, fpsAccum = 0, fps = 0

function animate() {
	requestAnimationFrame(animate)

	const now = performance.now()
	const dt = Math.min((now - lastTime) / 1000, 0.05)
	lastTime = now
	fpsAccum += dt; frameCount++
	if (fpsAccum >= 0.5) { fps = Math.round(frameCount / fpsAccum); fpsAccum = 0; frameCount = 0 }

	// (movement applied per-axis inside collision section below)

	// Detect if camera/feet are submerged
	const eyeBlock = getBlock(Math.floor(player.pos.x), Math.floor(player.pos.y - 0.1), Math.floor(player.pos.z))
	const feetBlock = getBlock(Math.floor(player.pos.x), Math.floor(player.pos.y - player.height + 0.1), Math.floor(player.pos.z))
	const underwater = eyeBlock === BLOCK.WATER
	const inWater = feetBlock === BLOCK.WATER || underwater

	// Underwater tint
	underwaterOverlay.style.display = underwater ? 'block' : 'none'
	if (underwater) {
		scene.fog.near = 4; scene.fog.far = 18
		scene.fog.color.set(0x1a4fa0)
		scene.background.set(0x1a4fa0)
	} else {
		scene.fog.near = 60; scene.fog.far = 160
		scene.fog.color.set(0x87ceeb)
		scene.background.set(0x87ceeb)
	}

	// Gravity / buoyancy
	if (inWater) {
		// In water: replace gravity with drag + direct swim controls.
		// Horizontal movement speed is reduced underwater.
		// Space = swim up, Shift = swim down (sink), neither = slowly float up to surface.
		const SWIM_SPEED = 4.0
		const SINK_SPEED = 3.0
		const FLOAT_SPEED = 1.5   // gentle upward drift when neither key pressed

		if (keys.Space || touchState.jump) {
			player.vel.y = SWIM_SPEED    // ascend
		} else if (keys.ShiftLeft || keys.ShiftRight || touchState.mine) {
			player.vel.y = -SINK_SPEED   // sink / submerge
		} else {
			// Drift gently upward so player naturally surfaces, but slowly
			player.vel.y += (FLOAT_SPEED - player.vel.y) * Math.min(dt * 3, 1)
		}
	} else {
		player.vel.y -= 9.8 * dt
	}

	// ── Split-axis collision ──────────────────────────────────────────────
	// Move one axis at a time, then resolve that axis before moving the next.
	// This prevents diagonal corner-clipping and jump-into-wall teleports.
	//
	// Player AABB (all relative to player.pos which is the EYE / top of head):
	//   feet  = player.pos.y - player.height   (bottom)
	//   head  = player.pos.y                   (top)
	//   width = HALF*2 = 0.6  (±HALF on each XZ side)

	function isSolid(b) { return b !== null && b !== BLOCK.WATER && b !== BLOCK.AIR }
	const HALF = 0.3

	// Returns true if the player AABB at position (px, py, pz) overlaps any
	// solid block. py is the eye/top position.
	function overlapsAt(px, py, pz) {
		const x0 = Math.floor(px - HALF), x1 = Math.floor(px + HALF - 0.001)
		const z0 = Math.floor(pz - HALF), z1 = Math.floor(pz + HALF - 0.001)
		const y0 = Math.floor(py - player.height + 0.001)
		const y1 = Math.floor(py - 0.001)
		for (let bx = x0; bx <= x1; bx++)
			for (let bz = z0; bz <= z1; bz++)
				for (let by = y0; by <= y1; by++)
					if (isSolid(getBlock(bx, by, bz))) return true
		return false
	}

	// Move Y first (gravity dominates feel), then X, then Z.
	// After each axis move, if we're now overlapping push back and zero velocity.

	// ── Y axis ────────────────────────────────────────────────────────────
	player.pos.y += player.vel.y * dt
	if (overlapsAt(player.pos.x, player.pos.y, player.pos.z)) {
		if (player.vel.y < 0) {
			// Falling — find the exact floor surface by stepping back up
			const feetTarget = Math.floor(player.pos.y - player.height) + 1
			player.pos.y = feetTarget + player.height
			if (!inWater) player.onGround = true   // only land on ground when not in water
		} else {
			// Rising — hit a ceiling, push down to just below it
			player.pos.y = Math.ceil(player.pos.y) - 0.001
		}
		player.vel.y = 0
	} else if (!inWater) {
		player.onGround = false
	}

	// When swimming up and leaving water, give a small exit boost so the
	// player can actually step onto shore (water surface → land block).
	if (!inWater && player.vel.y > 0 && player.onGround) {
		player.vel.y = Math.sqrt(2 * 9.8 * 0.6)   // small hop to clear the shore edge
		player.onGround = false
	}

	// ── X axis ────────────────────────────────────────────────────────────
	const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(yawObject.quaternion)
	const right   = new THREE.Vector3(1, 0, 0).applyQuaternion(yawObject.quaternion)

	let moveX = 0, moveZ = 0
	const horizSpeed = inWater ? player.speed * 0.5 : player.speed
	if (keys.KeyW) { moveX += forward.x * horizSpeed * dt; moveZ += forward.z * horizSpeed * dt }
	if (keys.KeyS) { moveX -= forward.x * horizSpeed * dt; moveZ -= forward.z * horizSpeed * dt }
	if (keys.KeyD) { moveX += right.x * horizSpeed * dt;   moveZ += right.z * horizSpeed * dt }
	if (keys.KeyA) { moveX -= right.x * horizSpeed * dt;   moveZ -= right.z * horizSpeed * dt }
	if (joy.active) {
		moveX += (-joy.dy * forward.x + joy.dx * right.x) * horizSpeed * dt
		moveZ += (-joy.dy * forward.z + joy.dx * right.z) * horizSpeed * dt
	}

	player.pos.x += moveX
	if (overlapsAt(player.pos.x, player.pos.y, player.pos.z)) {
		player.pos.x -= moveX   // revert only X
	}

	// ── Z axis ────────────────────────────────────────────────────────────
	player.pos.z += moveZ
	if (overlapsAt(player.pos.x, player.pos.y, player.pos.z)) {
		player.pos.z -= moveZ   // revert only Z
	}

	if ((keys.Space || touchState.jump) && player.onGround && !inWater) {
		player.vel.y = Math.sqrt(2 * 9.8 * 1.5)
		player.onGround = false
	}
	if (keys.Escape) document.exitPointerLock?.()
	if (keys.KeyN) {
		keys.KeyN = false
		player.pos.set(0, 20, 0)
		player.vel.set(0, 0, 0)
		player.onGround = false
		showToast('Respawned!')
	}

	yawObject.position.copy(player.pos)

	// Raycast once per frame — reuse for both mining and HUD
	currentTarget = raycastBlocks()
	updateHitbox(currentTarget)

	if (mining) mineBlock(dt)

	tickHandModel(dt)

	netSendMove(player.pos.x, player.pos.y, player.pos.z, yawObject.rotation.y, pitch)
	tickRemotePlayers(dt)
	tickMobs(dt)
	tickClouds(dt)

	// Chunk loading/unloading
	const cx = Math.floor(player.pos.x / CHUNK_SIZE)
	const cz = Math.floor(player.pos.z / CHUNK_SIZE)
	for (let x = -RENDER_DISTANCE; x <= RENDER_DISTANCE; x++)
		for (let z = -RENDER_DISTANCE; z <= RENDER_DISTANCE; z++) {
			const k = chunkKey(cx + x, cz + z)
			if (!chunks.has(k)) queueChunk(cx + x, cz + z)
		}
	flushChunkQueue(cx, cz)

	// Unload chunks that are too far away
	for (const [k] of chunks) {
		const [kcx, kcz] = k.split('_').map(Number)
		if (Math.abs(kcx - cx) > RENDER_DISTANCE + 1 || Math.abs(kcz - cz) > RENDER_DISTANCE + 1) {
			const old = chunks.get(k)
			if (old) {
				for (const m of old.meshes) { scene.remove(m); m.geometry.dispose() }
				if (old.pick) {
					scene.remove(old.pick); old.pick.geometry.dispose()
					const pi = pickMeshes.indexOf(old.pick)
					if (pi !== -1) pickMeshes.splice(pi, 1)
				}
			}
			chunks.delete(k)
			chunkQueue.delete(k)
		}
	}

	// Debug HUD
	let ti = 'target: none'
	if (currentTarget) {
		const { x, y, z, type, nx, ny, nz } = currentTarget.face
		const names = ['AIR', 'GRASS', 'DIRT', 'STONE', 'WATER', 'WOOD', 'LEAVES', 'BEDROCK', 'SAND']
		ti = `target: ${names[type] || type} @ ${x},${y},${z}  place→ ${x + nx},${y + ny},${z + nz}`
	}
	debug.textContent =
`pos  ${player.pos.x.toFixed(1)} ${player.pos.y.toFixed(1)} ${player.pos.z.toFixed(1)}
fps  ${fps}  chunks ${chunks.size}  queue ${chunkQueue.size}  modified ${modified.size}
${ti}
slot: ${selectedSlot}  id: ${myId ?? 'offline'}  peers: ${remotePlayers.size}
in water: ${Boolean(inWater).toString()}`

	renderer.render(scene, camera)
}

// animate() is called by startGame() once the lobby is dismissed
setTimeout(() => document.getElementById('debugImg').src = atlasCanvas.toDataURL(), 500)
